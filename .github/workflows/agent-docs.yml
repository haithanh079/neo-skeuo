name: Agent docs

on:
  pull_request:
    paths:
      - "packages/react/**"
      - "docs/components.catalog.json"
      - "scripts/sync-catalog.mjs"
  push:
    branches: [master]
    paths:
      - "packages/react/**"
      - "docs/components.catalog.json"
      - "scripts/sync-catalog.mjs"

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run catalog:sync -- --check
