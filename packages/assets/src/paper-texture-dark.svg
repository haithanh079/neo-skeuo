<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <filter id="grain-dark" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
    <feComponentTransfer in="mono">
      <feFuncA type="linear" slope="0.08"/>
    </feComponentTransfer>
  </filter>
  <rect width="256" height="256" fill="#1c1b19" filter="url(#grain-dark)"/>
</svg>
